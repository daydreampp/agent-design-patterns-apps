name: Sync upstream Agent Design Patterns

on:
  workflow_dispatch:
    inputs:
      upstream_ref:
        description: Upstream ref to sync
        required: false
        default: main
  schedule:
    - cron: "17 2 * * *"

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout package repo
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Sync upstream repository copies
        run: python3 scripts/sync_upstream.py --ref "${{ inputs.upstream_ref || 'main' }}"

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit and push changes
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md upstream-lock.json install.sh shared apps
          git commit -m "chore: sync upstream agent-design-patterns"
          git push
